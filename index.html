<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NecroTap</title>
  
  <!-- Fonts -->
  <style>
    @font-face {
      font-family: 'TheMacabre';
      src: url('assets/TheMacabre.otf') format('opentype');
    }
    body {
      font-family: 'TheMacabre', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: black;
    }
  </style>

  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <!-- Fixed container for 1080x1920 resolution -->
  <div class="fixed-container">
    <!-- Background Image -->
    <div class="background-container">
      <img src="assets/background.png" alt="Background" class="background">
    </div>

    <!-- NecroTap Logo -->
    <div class="logo-container">
      <img src="assets/necrotap_logo.png" alt="NecroTap Logo" class="logo">
    </div>

    <!-- Central Orb -->
    <div class="central-orb-container">
      <img src="assets/orb_spin.gif" alt="Orb" id="central-orb">
    </div>

    <!-- HP Bar -->
    <div class="hp-bar">
      <img src="assets/hp_bar.png" alt="HP Bar" class="bar">
      <div class="hp-text" id="hp-text">2500/2500</div>
    </div>

    <!-- Mutabytes Earn Container -->
    <div class="mutabytes-earn-container">
      <img src="assets/mutabytes_earn.png" alt="Mutabytes Earn" class="bar">
      <div class="mutabytes-text" id="mutabytes-text">0</div>
    </div>

    <!-- Wraithium Earn Container -->
    <div class="wraithium-earn-container">
      <img src="assets/wraithium_earn.png" alt="Wraithium Earn" class="bar">
      <div class="wraithium-text" id="wraithium-text">0</div>
    </div>

    <!-- Mutabytes Per Hour Container -->
    <div class="mutabytes-per-hour-container">
      <img src="assets/mutabytes_per_hour.png" alt="Mutabytes Per Hour" class="bar">
      <div class="mutabytes-per-hour-text" id="mutabytes-per-hour-text">0</div>
    </div>

    <!-- Mutabytes Per Tap Container -->
    <div class="mutabytes-per-tap-container">
      <img src="assets/mutabytes_per_tap.png" alt="Mutabytes Per Tap" class="bar">
      <div class="mutabytes-per-tap-text" id="mutabytes-per-tap-text">1</div>
    </div>

    <!-- Icons with Popup Overlay -->
    <div class="icons-container">
      <img src="assets/phants_icon.png" alt="Phants" class="icon" id="phants-icon" onclick="showPopup()">
      <img src="assets/trinkets_icon.png" alt="Trinkets" class="icon" id="trinkets-icon" onclick="showPopup()">
      <img src="assets/tap_icon.png" alt="Tap" class="icon" id="tap-icon" onclick="showPopup()">
      <img src="assets/earn_icon.png" alt="Earn" class="icon" id="earn-icon" onclick="showPopup()">
      <img src="assets/haunts_icon.png" alt="Haunts" class="icon" id="haunts-icon" onclick="showPopup()">
    </div>

    <!-- Popup Overlay -->
    <div class="popup-overlay" id="popup-overlay">
      <div class="popup-content">
        <span class="close-popup" id="close-popup" onclick="closePopup()">X</span>
        <p>COMING SOON</p>
      </div>
    </div>
  </div>
</body>
</html>
