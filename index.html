<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NecroTap</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <!-- Background Image -->
  <div class="background-container">
    <img src="assets/background.png" alt="Background" class="background">
  </div>

  <!-- Central Orb -->
  <div class="central-orb-container">
    <img src="assets/orb.png" alt="Orb" id="central-orb">
  </div>

  <!-- HP Bar -->
  <div class="hp-bar">
    <img src="assets/hp_bar.png" alt="HP Bar" class="bar">
    <div class="hp-text" id="hp-text">2500/2500</div>
  </div>

  <!-- Mutabytes Bar -->
  <div class="mutabytes-bar">
    <img src="assets/mutabytes_bar.png" alt="Mutabytes Bar" class="bar">
    <div class="mutabytes-text" id="mutabytes-text">Mutabytes: 0</div>
  </div>

  <!-- Wraithium Bar -->
  <div class="wraithium-bar">
    <img src="assets/wraithium_bar.png" alt="Wraithium Bar" class="bar">
    <div class="wraithium-text" id="wraithium-text">Wraithium: 0</div>
  </div>

  <!-- Icons -->
  <div class="icons-container">
    <img src="assets/phants_icon.png" alt="Phants" class="icon" id="phants-icon">
    <img src="assets/trinkets_icon.png" alt="Trinkets" class="icon" id="trinkets-icon">
    <img src="assets/tap_icon.png" alt="Tap" class="icon" id="tap-icon">
    <img src="assets/earn_icon.png" alt="Earn" class="icon" id="earn-icon">
    <img src="assets/haunts_icon.png" alt="Haunts" class="icon" id="haunts-icon">
  </div>

  <!-- Popup Overlay -->
  <div class="popup-overlay" id="popup-overlay">
    <div class="popup-content">
      <span class="close-popup" id="close-popup">X</span>
      <p>COMING SOON</p>
    </div>
  </div>

  <!-- TON Login Modal -->
  <div class="login-modal" id="login-modal">
    <div class="login-modal-content">
      <h2>Log in to TON Wallet</h2>
      <button id="login-button">Log In</button>
    </div>
  </div>
</body>
</html>
